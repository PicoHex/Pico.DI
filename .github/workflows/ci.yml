name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '10.x'
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

permissions:
  contents: write

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Required for SourceLink
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore -p:UseProjectReferences=true
    
    - name: Build
      run: dotnet build --configuration Release --no-restore -p:UseProjectReferences=true
    
    - name: Run tests
      run: dotnet test --project tests/Pico.DI.Test/Pico.DI.Test.csproj --configuration Release --no-build --verbosity normal --timeout 120s --no-progress --no-ansi -p:UseProjectReferences=true

  pack:
    name: Pack
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Pack NuGet packages
      run: |
        rm -rf ./nupkg
        mkdir -p ./nupkg
        dotnet pack src/Pico.DI.Abs/Pico.DI.Abs.csproj --configuration Release --output ./nupkg --no-cache -p:RestoreSources=https://api.nuget.org/v3/index.json -p:Version=${{ steps.version.outputs.VERSION }} -p:UseProjectReferences=false -p:PicoDiPackageVersion=${{ steps.version.outputs.VERSION }}
        dotnet pack src/Pico.DI.Gen/Pico.DI.Gen.csproj --configuration Release --output ./nupkg --no-cache -p:RestoreSources=https://api.nuget.org/v3/index.json -p:RestoreAdditionalProjectSources=${{ github.workspace }}/nupkg -p:Version=${{ steps.version.outputs.VERSION }} -p:UseProjectReferences=false -p:PicoDiPackageVersion=${{ steps.version.outputs.VERSION }}
        dotnet pack src/Pico.DI/Pico.DI.csproj --configuration Release --output ./nupkg --no-cache -p:RestoreSources=${{ github.workspace }}/nupkg -p:Version=${{ steps.version.outputs.VERSION }} -p:UseProjectReferences=false -p:PicoDiPackageVersion=${{ steps.version.outputs.VERSION }}
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nupkg
        path: |
          ./nupkg/*.nupkg
          ./nupkg/*.snupkg

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: pack
    if: startsWith(github.ref, 'refs/tags/v')
    environment: release
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: nupkg
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Publish to NuGet.org
      run: |
        dotnet nuget push Pico.DI.Abs.${{ steps.version.outputs.VERSION }}.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate
        dotnet nuget push Pico.DI.Gen.${{ steps.version.outputs.VERSION }}.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate
        dotnet nuget push Pico.DI.${{ steps.version.outputs.VERSION }}.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate

    - name: Create draft GitHub release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Pico.DI ${{ steps.version.outputs.VERSION }}
        draft: true
        generate_release_notes: true
        body: |
          Draft release for Pico.DI v${{ steps.version.outputs.VERSION }}.

          Included packages:
          - Pico.DI
          - Pico.DI.Gen
          - Pico.DI.Abs

          NuGet packages have already been pushed before this draft release was created.

          Review the generated release notes below before publishing.
        files: |
          Pico.DI.Abs.${{ steps.version.outputs.VERSION }}.nupkg
          Pico.DI.Gen.${{ steps.version.outputs.VERSION }}.nupkg
          Pico.DI.${{ steps.version.outputs.VERSION }}.nupkg

    - name: Publish GitHub release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Pico.DI ${{ steps.version.outputs.VERSION }}
        draft: false